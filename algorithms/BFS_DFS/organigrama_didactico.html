<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Organigrama mixto (nivel 2 horizontal y luego vertical con spine)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f4f6fb;
      --bg-panel: rgba(255, 255, 255, 0.88);
      --bg-panel-strong: #ffffff;
      --ink-strong: #0f172a;
      --ink-soft: #475569;
      --line-soft: #dbe3ef;
      --accent-main: #0a7ea4;
      --accent-main-2: #1e90b8;
      --accent-warm: #ef8354;
      --shadow-soft: 0 16px 30px rgba(15, 23, 42, 0.08);
      --radius-md: 14px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Manrope", "Segoe UI", Arial, sans-serif;
      color: var(--ink-strong);
      margin: 0;
      padding: 28px 22px;
      background:
        radial-gradient(1200px 540px at -8% -8%, #dff5ff 0%, transparent 62%),
        radial-gradient(980px 420px at 108% 8%, #ffe7de 0%, transparent 58%),
        linear-gradient(180deg, #f8fafe 0%, var(--bg-base) 100%);
    }

    h2 {
      margin: 0;
      font-family: "Space Grotesk", "Manrope", sans-serif;
      font-size: clamp(1.25rem, 1.6vw, 1.65rem);
      letter-spacing: -0.01em;
    }

    .page-shell {
      max-width: 1500px;
      margin: 0 auto;
    }

    .topbar {
      margin-bottom: 14px;
      padding: 0 2px;
    }

    .topbar .hint {
      margin-top: 6px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(500px, 1fr) minmax(360px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 16px;
    }

    .panel-head {
      margin-bottom: 10px;
      font-family: "Space Grotesk", "Manrope", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #0b3453;
      letter-spacing: 0.01em;
    }

    .panel-subhead {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7f95;
    }

    textarea {
      width: 100%;
      height: 230px;
      margin-top: 12px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid #c7d5e4;
      background: #0f172a;
      color: #e2e8f0;
      font-family: "Consolas", "SFMono-Regular", "Cascadia Mono", monospace;
      font-size: 12.5px;
      line-height: 1.45;
      resize: vertical;
    }

    textarea:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent-main-2);
      box-shadow: 0 0 0 3px rgba(30, 144, 184, 0.16);
    }

    .action-bar {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      font-family: "Manrope", sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent-main), var(--accent-main-2));
      box-shadow: 0 2px 6px rgba(10, 126, 164, 0.14);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(10, 126, 164, 0.18);
      filter: saturate(1.06);
    }

    button:active {

    }

    #stopBtn {
      background: linear-gradient(135deg, #c65432, var(--accent-warm));
      box-shadow: 0 2px 6px rgba(198, 84, 50, 0.14);
    }

    #applyDepthBtn {
      background: linear-gradient(135deg, #3556d8, #4f75ff);
      box-shadow: 0 2px 6px rgba(53, 86, 216, 0.14);
    }

    .control-stack {
      display: grid;
      gap: 12px;
    }

    .control-card {
      background: #f8fbff;
      border: 1px solid #d9e5f0;
      border-radius: 13px;
      padding: 12px;
    }

    .hint {
      color: var(--ink-soft);
      margin: 8px 0 0;
      line-height: 1.42;
      font-size: 13px;
    }

    .depth-control {
      margin-bottom: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      font-size: 13px;
      color: var(--ink-soft);
    }

    .speed-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink-soft);
      background: #eef4fa;
      border: 1px solid #d2deea;
      border-radius: 999px;
      padding: 7px 10px;
    }

    .anim-control-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 9px;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .anim-control-row .panel-subhead {
      margin: 0 6px 0 0;
      white-space: nowrap;
    }

    .anim-control-row .speed-control {
      margin-left: auto;
      white-space: nowrap;
    }

    input[type="number"] {
      width: 78px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #c8d5e2;
      background: #ffffff;
      color: var(--ink-strong);
      font-family: "Manrope", sans-serif;
      font-weight: 700;
    }

    #animStatus {
      margin-top: 0;
      background: #f3f7fd;
      border: 1px solid #d8e2ef;
      border-radius: 11px;
      padding: 11px 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .legend-list {
      display: grid;
      gap: 8px;
      margin-top: 2px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 600;
      line-height: 1.3;
    }

    .legend-chip {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid transparent;
      flex: 0 0 16px;
    }

    .legend-chip.bfs {
      background: #e6f1ff;
      border-color: #1d4ed8;
    }

    .legend-chip.dfs {
      background: #e8fff1;
      border-color: #15803d;
    }

    svg {
      width: 100%;
      height: 78vh;
      margin-top: 16px;
      border: 1px solid #ced9e6;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(252, 253, 255, 0.97)),
        repeating-linear-gradient(
          0deg,
          rgba(200, 211, 224, 0.16) 0,
          rgba(200, 211, 224, 0.16) 1px,
          transparent 1px,
          transparent 36px
        );
      box-shadow: var(--shadow-soft);
    }

    .node text { dominant-baseline: middle; }
    .node.bfs rect { fill: #e6f1ff; stroke: #1d4ed8; }
    .node.bfs path { fill: #1d4ed8; }
    .link.bfs { stroke: #1d4ed8; stroke-width: 2.2; }
    .spine.bfs { stroke: #1d4ed8; stroke-width: 2.2; }

    .node.dfs rect { fill: #e8fff1; stroke: #15803d; }
    .node.dfs path { fill: #15803d; }
    .link.dfs { stroke: #15803d; stroke-width: 2.2; }
    .spine.dfs { stroke: #15803d; stroke-width: 2.2; }

    @media (max-width: 1180px) {
      .row { grid-template-columns: 1fr; }
      textarea { height: 210px; }
      svg { height: 70vh; }
      .anim-control-row { gap: 8px; }
      .status-grid { grid-template-columns: 1fr; }
    }
  </style>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
  // ======= CONFIG =======
  let HORIZONTAL_MAX_DEPTH = 3; // BFS incluye hasta depth=3 (raiz depth=0)

  const NODE_W = 236;
  const NODE_H = 72;        // alto para permitir salto de línea en título/subtítulo
  const ACCENT_W = 8;

  const H_GAP = 50;
  const DEPTH_GAP = 86;

  const V_GAP = NODE_H + 28;
  const STACK_OFFSET_X = 36; // primer nivel vertical mas cerca del centro del padre
  const INDENT = 24;         // subniveles con desplazamiento horizontal ligeramente mayor

  const MARGIN = {top: 24, left: 24};

  // ======= CSV -> TREE =======
  function detectDelimiter(text) {
    const firstLine = (text || "").split(/\r?\n/).find(l => l.trim().length);
    if (!firstLine) return ",";

    function countDelimOutsideQuotes(line, delim) {
      let count = 0;
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            i++;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }
        if (!inQuotes && ch === delim) count++;
      }
      return count;
    }

    const semicolons = countDelimOutsideQuotes(firstLine, ";");
    const commas = countDelimOutsideQuotes(firstLine, ",");
    return semicolons > commas ? ";" : ",";
  }

  function getField(row, candidates) {
    const keys = Object.keys(row);
    const normalize = s => String(s ?? "").replace(/^\uFEFF/, "").trim().toLowerCase();

    for (const candidate of candidates) {
      const target = normalize(candidate);
      const key = keys.find(k => normalize(k) === target);
      if (key != null) return String(row[key] ?? "").trim();
    }
    return "";
  }

  function parseCSV(text) {
    const clean = String(text ?? "").replace(/^\uFEFF/, "").trim();
    const delimiter = detectDelimiter(clean);
    const parser = delimiter === ";" ? d3.dsvFormat(";").parse : d3.csvParse;
    const rows = parser(clean);

    const norm = rows.map(r => ({
      id: getField(r, ["Id. de empleado", "Id de empleado", "id"]),
      name: getField(r, ["Nombre", "name"]),
      label: getField(r, ["Título", "T\u00edtulo", "TÃ­tulo", "Titulo", "label"]),
      parent: getField(r, ["Id. de administrador", "Id de administrador", "parent"]),
      role: getField(r, ["Tipo de rol", "role"]),
    })).filter(r => r.id);

    const ids = new Set();
    for (const r of norm) {
      if (ids.has(r.id)) throw new Error(`ID duplicado: ${r.id}`);
      ids.add(r.id);
    }
    return norm;
  }

  function buildHierarchy(rows) {
    const byId = new Map(rows.map(r => [r.id, {...r, children: []}]));
    let root = null;

    for (const r of byId.values()) {
      if (!r.parent) {
        if (root) throw new Error("Hay mas de una raiz (mas de un parent vacio).");
        root = r;
      } else {
        const p = byId.get(r.parent);
        if (p) p.children.push(r);
      }
    }
    if (!root) throw new Error("No se encontro raiz (fila con parent vacio).");
    return d3.hierarchy(root, d => d.children);
  }

  // ======= LAYOUT MIXTO + SPINE =======
  function layoutMixed(root) {
    function collectPreorder(node, out = []) {
      out.push(node);
      for (const c of (node.children || [])) collectPreorder(c, out);
      return out;
    }

    const tree = d3.tree().nodeSize([NODE_W + H_GAP, NODE_H + DEPTH_GAP]);
    const horizontalRoot = root.copy();
    horizontalRoot.each(n => {
      if (n.depth >= HORIZONTAL_MAX_DEPTH) n.children = null;
    });
    tree(horizontalRoot);

    const topPosById = new Map(
      horizontalRoot.descendants().map(n => [n.data.id, {x: n.x, y: n.y}])
    );

    root.descendants().forEach(n => {
      const pos = topPosById.get(n.data.id);
      if (pos) {
        n.x = pos.x;
        n.y = pos.y;
      }
      n._isVertical = false;
      n._spineX = null;
    });

    root._spineSegments = [];

    const anchors = root.descendants().filter(n => n.depth === HORIZONTAL_MAX_DEPTH);

    for (const a of anchors) {
      const anchorChildren = a.children || [];
      if (!anchorChildren.length) continue;

      let cursorY = a.y + DEPTH_GAP;

      // Mantiene orden DFS real del subarbol para preservar padre-hijo en vertical.
      for (const child of anchorChildren) {
        const subtreeNodes = collectPreorder(child);

        for (const n of subtreeNodes) {
          const levelOffset = n.depth - a.depth - 1;
          const spineX = a.x + NODE_W / 2 + levelOffset * INDENT;
          const nodeX = spineX + STACK_OFFSET_X;

          n._isVertical = true;
          n._spineX = spineX;
          n.x = nodeX;
          n.y = cursorY;
          cursorY += V_GAP;
        }

        // Dibuja espinas solo entre hermanos con el mismo padre (evita unir ramas distintas).
        for (const p of subtreeNodes) {
          const kids = (p.children || []).filter(k => k._isVertical);
          if (kids.length <= 1) continue;
          const first = kids[0];
          const last = kids[kids.length - 1];
          root._spineSegments.push({
            x: first._spineX,
            y0: first.y + NODE_H / 2,
            y1: last.y + NODE_H / 2
          });
        }
        cursorY += 14;
      }
    }
    return root;
  }

  // ======= RENDER =======
  function render(root) {
    const svg = d3.select("#svg");
    svg.selectAll("*").remove();

    const nodes = root.descendants();

    const minX = d3.min(nodes, d => d.x);
    const maxX = d3.max(nodes, d => d.x);
    const minY = d3.min(nodes, d => d.y);
    const maxY = d3.max(nodes, d => d.y);

    const width = (maxX - minX) + NODE_W + MARGIN.left * 2 + 80;
    const height = (maxY - minY) + NODE_H + MARGIN.top * 2 + 80;

    svg.attr("viewBox", `0 0 ${width} ${height}`);

    const g = svg.append("g")
      .attr("transform", `translate(${MARGIN.left - minX},${MARGIN.top - minY})`);

    // SPINES
    const spineSegments = root._spineSegments || [];
    g.selectAll(".spine")
      .data(spineSegments)
      .enter()
      .append("line")
      .attr("class", "spine")
      .attr("stroke", "#333")
      .attr("stroke-width", 1.2)
      .attr("x1", d => d.x)
      .attr("x2", d => d.x)
      .attr("y1", d => d.y0)
      .attr("y2", d => d.y1);

    // LINKS
    const links = root.links();

    function elbowNormal(d) {
      const sx = d.source.x + NODE_W / 2;
      const sy = d.source.y + NODE_H;
      const tx = d.target.x + NODE_W / 2;
      const ty = d.target.y;

      const midY = sy + (ty - sy) * 0.35;
      return `M ${sx} ${sy}
              L ${sx} ${midY}
              L ${tx} ${midY}
              L ${tx} ${ty}`;
    }

    function elbowSpine(d) {
      const sx = d.source.x + NODE_W / 2;
      const sy = d.source.y + NODE_H;

      const spineX = d.target._spineX;
      const tyMid = d.target.y + NODE_H / 2;
      const txLeft = d.target.x;

      const midY = sy + 14;
      return `M ${sx} ${sy}
              L ${sx} ${midY}
              L ${spineX} ${midY}
              L ${spineX} ${tyMid}
              L ${txLeft} ${tyMid}`;
    }

    g.selectAll(".link")
      .data(links)
      .enter()
      .append("path")
      .attr("class", "link")
      .attr("data-target-id", d => d.target.data.id)
      .attr("fill", "none")
      .attr("stroke", "#333")
      .attr("stroke-width", 1.2)
      .attr("d", d => d.target._isVertical ? elbowSpine(d) : elbowNormal(d));

    // NODES
    const node = g.selectAll(".node")
      .data(nodes)
      .enter()
      .append("g")
      .attr("class", "node")
      .attr("data-id", d => d.data.id)
      .attr("transform", d => `translate(${d.x},${d.y})`);

    function leftAccentPath(width, height, radius) {
      const r = Math.max(0, Math.min(radius, width, height / 2));
      return [
        `M ${width} 0`,
        `H ${r}`,
        `Q 0 0 0 ${r}`,
        `V ${height - r}`,
        `Q 0 ${height} ${r} ${height}`,
        `H ${width}`,
        "Z"
      ].join(" ");
    }

    node.append("rect")
      .attr("fill", "#ececec")
      .attr("stroke", "#d4d6da")
      .attr("stroke-width", 1)
      .attr("rx", 8)
      .attr("ry", 8)
      .attr("width", NODE_W)
      .attr("height", NODE_H);

    node.append("path")
      .attr("fill", "#0d3a6e")
      .attr("d", leftAccentPath(ACCENT_W, NODE_H, 8));

    function wrapText(text, maxCharsPerLine, maxLines) {
      const value = String(text ?? "").trim().replace(/\s+/g, " ");
      if (!value) return [];

      const words = value.split(" ");
      const lines = [];
      let current = "";
      let i = 0;

      while (i < words.length && lines.length < maxLines) {
        const word = words[i];
        const candidate = current ? `${current} ${word}` : word;

        if (candidate.length <= maxCharsPerLine) {
          current = candidate;
          i++;
          continue;
        }

        if (current) {
          lines.push(current);
          current = "";
        } else {
          lines.push(word.slice(0, maxCharsPerLine));
          i++;
        }
      }

      if (current && lines.length < maxLines) lines.push(current);

      if (i < words.length && lines.length) {
        const last = lines.length - 1;
        const room = Math.max(1, maxCharsPerLine - 3);
        lines[last] = (lines[last].length > room ? lines[last].slice(0, room) : lines[last]) + "...";
      }

      return lines;
    }

    function drawCenteredLines(group, lines, centerY, fontSize, fontWeight) {
      if (!lines.length) return;
      const lineStep = fontSize + 2;
      const startY = centerY - ((lines.length - 1) * lineStep) / 2;

      const text = group.append("text")
        .attr("font-family", "system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif")
        .attr("fill", "#1f2937")
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .attr("font-size", fontSize)
        .attr("font-weight", fontWeight);

      lines.forEach((line, idx) => {
        text.append("tspan")
          .attr("x", NODE_W / 2)
          .attr("y", startY + idx * lineStep)
          .text(line);
      });
    }

    node.each(function(d) {
      const gNode = d3.select(this);
      const nameLines = wrapText(d.data.name || d.data.id, 24, 2);
      const subtitle = [d.data.label, d.data.role].filter(Boolean).join(" - ");
      const subtitleLines = wrapText(subtitle, 28, 2);

      drawCenteredLines(gNode, nameLines, NODE_H * 0.34, 12, 700);
      drawCenteredLines(gNode, subtitleLines, NODE_H * 0.72, 9, 400);
    });
    node.append("title")
      .text(d => {
        const r = d.data;
        return `ID: ${r.id}\nNombre: ${r.name}\nTitulo: ${r.label}\nRol: ${r.role}\nParent: ${r.parent || "-"}`;
      });
  }

  function buildAndRender() {
    try {
      const rows = parseCSV(document.getElementById("csvInput").value);
      const root = buildHierarchy(rows);
      layoutMixed(root);
      render(root);
      window.__lastRoot = root;
    } catch (e) {
      alert(e.message);
      console.error(e);
    }
  }

  document.getElementById("renderBtn").addEventListener("click", buildAndRender);
  document.getElementById("animateBtn").addEventListener("click", () => animateTraversal());
  document.getElementById("stopBtn").addEventListener("click", () => stopAnimation());
  document.getElementById("applyDepthBtn").addEventListener("click", () => {
    const val = Number(document.getElementById("depthInput").value);
    if (Number.isFinite(val)) {
      HORIZONTAL_MAX_DEPTH = Math.max(0, Math.floor(val));
      buildAndRender();
    }
  });

  function makeStandaloneSvg() {
    const svgEl = document.getElementById("svg");
    const clone = svgEl.cloneNode(true);
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
    clone.setAttribute("version", "1.1");
    clone.style.background = "transparent";

    const viewBox = svgEl.viewBox.baseVal;
    const width = Math.max(1, Math.ceil(viewBox && viewBox.width ? viewBox.width : svgEl.clientWidth || 1200));
    const height = Math.max(1, Math.ceil(viewBox && viewBox.height ? viewBox.height : svgEl.clientHeight || 800));

    clone.setAttribute("width", String(width));
    clone.setAttribute("height", String(height));
    clone.setAttribute("viewBox", `0 0 ${width} ${height}`);

    return {
      width,
      height,
      xml: new XMLSerializer().serializeToString(clone)
    };
  }

  function exportSvgToRaster({format = "png", quality = 0.92, background = null, filename}) {
    const {width, height, xml} = makeStandaloneSvg();
    const svgBlob = new Blob([xml], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();

    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      if (!ctx) {
        URL.revokeObjectURL(url);
        alert("No fue posible crear el contexto de imagen.");
        return;
      }

      if (background) {
        ctx.fillStyle = background;
        ctx.fillRect(0, 0, width, height);
      }

      ctx.drawImage(img, 0, 0, width, height);

      const mime = format === "jpeg" ? "image/jpeg" : "image/png";
      const outUrl = canvas.toDataURL(mime, quality);
      const a = document.createElement("a");
      a.href = outUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    };

    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert("No fue posible exportar la imagen.");
    };

    img.src = url;
  }

  function downloadSvg() {
    const {xml} = makeStandaloneSvg();
    const blob = new Blob([xml], {type: "image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "organigrama_spine_nombre_titulo.svg";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  document.getElementById("downloadPngBtn").addEventListener("click", () => {
    exportSvgToRaster({
      format: "png",
      background: null,
      filename: "organigrama_spine_nombre_titulo.png"
    });
  });

  document.getElementById("downloadJpgBtn").addEventListener("click", () => {
    exportSvgToRaster({
      format: "jpeg",
      quality: 0.95,
      background: "#ffffff",
      filename: "organigrama_spine_nombre_titulo.jpg"
    });
  });

  document.getElementById("downloadSvgBtn").addEventListener("click", downloadSvg);

  buildAndRender();

  // ======= DIDACTIC ANIMATION =======
  let animationToken = 0;

  function stopAnimation() {
    animationToken++;
    setStatus("Estado: detenido");
  }

  function getVisitOrder(root) {
    if (!root) return [];

    const order = [];
    const maxDepth = HORIZONTAL_MAX_DEPTH;

    // BFS from root up to depth <= maxDepth
    const queue = [root];
    while (queue.length) {
      const node = queue.shift();
      if (node.depth <= maxDepth) {
        order.push(node);
        for (const c of (node.children || [])) queue.push(c);
      }
    }

    // DFS from anchors' children (depth == HORIZONTAL_MAX_DEPTH), in natural order
    const anchors = root.descendants().filter(n => n.depth === HORIZONTAL_MAX_DEPTH);
    const dfs = (n) => {
      order.push(n);
      for (const c of (n.children || [])) dfs(c);
    };
    for (const a of anchors) {
      for (const c of (a.children || [])) dfs(c);
    }

    // Remove duplicates while preserving order (BFS may include anchors)
    const seen = new Set();
    const uniq = [];
    for (const n of order) {
      if (seen.has(n.data.id)) continue;
      seen.add(n.data.id);
      uniq.push(n);
    }
    return uniq;
  }

  function clearHighlights() {
    d3.selectAll(".node").classed("bfs", false).classed("dfs", false);
    d3.selectAll(".link").classed("bfs", false).classed("dfs", false);
    d3.selectAll(".spine").classed("bfs", false).classed("dfs", false);
  }

  function setStatus(text) {
    const el = document.getElementById("animStatus");
    if (el) el.textContent = text;
  }

  async function animateTraversal() {
    const token = ++animationToken;
    clearHighlights();

    const root = window.__lastRoot;
    const order = getVisitOrder(root);
    const speed = Math.max(100, Number(document.getElementById("speedInput").value) || 300);

    setStatus(`Estado: BFS niveles 0..${HORIZONTAL_MAX_DEPTH}, luego DFS`);

    for (const n of order) {
      if (token !== animationToken) return;
      const id = n.data.id;
      const phase = n.depth <= HORIZONTAL_MAX_DEPTH ? "BFS" : "DFS";
      setStatus(`Estado: ${phase} - ${id} (${n.data.name || id})`);
      const cls = phase.toLowerCase();
      d3.select(`.node[data-id="${id}"]`).classed(cls, true);
      d3.selectAll(`.link[data-target-id="${id}"]`).classed(cls, true);
      if (n._isVertical && n._spineX != null) {
        d3.selectAll(".spine").classed(cls, true);
      }
      await new Promise(r => setTimeout(r, speed));
    }
    setStatus("Estado: finalizado");
  }
</script>
</body>
